apiVersion: v1
kind: Namespace
metadata:
  name: ccms-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccms-frontend
  namespace: ccms-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ccms-frontend
  template:
    metadata:
      labels:
        app: ccms-frontend
    spec:
      containers:
      - name: ccms-frontend
        image: <ACR_NAME>.azurecr.io/ccms-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: ccms-frontend-service
  namespace: ccms-prod
spec:
  type: ClusterIP
  selector:
    app: ccms-frontend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ccms-frontend-ingress
  namespace: ccms-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: #{ingressHost}#
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ccms-frontend-service
            port:
              number: 80
