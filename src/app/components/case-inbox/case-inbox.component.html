<div class="inbox-container">
  <div class="inbox-header">
    <h1>Case Inbox</h1>
    <p>Manage and review incoming case actions.</p>
  </div>

  <mat-card class="glass-panel tab-card">
    <mat-tab-group (selectedTabChange)="onTabChange($event)" class="custom-tabs">
      <mat-tab label="Awaiting Action">
        <ng-container *ngTemplateOutlet="caseTable; context: { $implicit: awaitingCases }"></ng-container>
      </mat-tab>

      <mat-tab label="Completed">
        <ng-container *ngTemplateOutlet="caseTable; context: { $implicit: completedCases }"></ng-container>
      </mat-tab>

      <mat-tab label="Auto Resolved">
        <ng-container *ngTemplateOutlet="caseTable; context: { $implicit: autoResolvedCases }"></ng-container>
      </mat-tab>

      <mat-tab label="Pending Batch">
        <ng-container *ngTemplateOutlet="caseTable; context: { $implicit: pendingBatchCases }"></ng-container>
      </mat-tab>
    </mat-tab-group>
  </mat-card>
</div>

<ng-template #caseTable let-cases>
  <div class="table-responsive">
    <table mat-table [dataSource]="cases" class="ccms-table">

      <ng-container matColumnDef="caseNumber">
        <th mat-header-cell *matHeaderCellDef> Case Number </th>
        <td mat-cell *matCellDef="let element" class="font-mono"> {{element.caseNumber}} </td>
      </ng-container>

      <ng-container matColumnDef="defendantName">
        <th mat-header-cell *matHeaderCellDef> Defendant Name </th>
        <td mat-cell *matCellDef="let element" class="font-bold"> {{element.defendantName}} </td>
      </ng-container>

      <ng-container matColumnDef="orderType">
        <th mat-header-cell *matHeaderCellDef> Order Type </th>
        <td mat-cell *matCellDef="let element">
          <span class="type-badge" [class.freeze]="getOrderTypeName(element.orderType) === 'Freeze'">
            {{getOrderTypeName(element.orderType)}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <a mat-icon-button color="primary" (click)="viewCase(element.id)">
            <mat-icon>visibility</mat-icon>
          </a>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-state" colspan="4">
          <div class="empty-message">No cases found matching the criteria.</div>
        </td>
      </tr>
    </table>
  </div>
</ng-template>
