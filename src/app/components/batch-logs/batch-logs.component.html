<div class="logs-container">
  <h1>Batch Processing Logs</h1>

  <div class="table-container mat-elevation-z8">
    <table mat-table [dataSource]="logs">

      <ng-container matColumnDef="runTime">
        <th mat-header-cell *matHeaderCellDef> Run Time </th>
        <td mat-cell *matCellDef="let element"> {{element.runTime | date:'medium'}} </td>
      </ng-container>

      <ng-container matColumnDef="durationInSeconds">
        <th mat-header-cell *matHeaderCellDef> Duration (sec) </th>
        <td mat-cell *matCellDef="let element"> {{element.durationInSeconds}} </td>
      </ng-container>

      <ng-container matColumnDef="processedCount">
        <th mat-header-cell *matHeaderCellDef> Processed </th>
        <td mat-cell *matCellDef="let element"> {{element.processedCount}} </td>
      </ng-container>

      <ng-container matColumnDef="validatedCount">
        <th mat-header-cell *matHeaderCellDef> Validated </th>
        <td mat-cell *matCellDef="let element"> {{element.validatedCount}} </td>
      </ng-container>

      <ng-container matColumnDef="notFoundCount">
        <th mat-header-cell *matHeaderCellDef> Not Found </th>
        <td mat-cell *matCellDef="let element"> {{element.notFoundCount}} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element"> {{element.status}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="6">No batch logs found.</td>
      </tr>
    </table>
  </div>
</div>
